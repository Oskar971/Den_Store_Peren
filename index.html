<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <script src="javascript.js" defer></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="side1">
      <div class="infoForside"><h2 class="tekst">Den mystiske øy</h2></div>
      <div><p class="tekst">Klikk kanppen for å starte</p></div>

      <div class="knapp-wrapper">
        <button onclick="byttSide('side2')">
          <img class="forside_bildet" src="bilder/StartKnapp.png" alt="feil" />
        </button>
      </div>
    </div>

    <div id="side2" style="display: none">
      <div class="kort">
        <img class="bildeKort" src="bilder/Pære frø.png" alt="feil" />
        <p class="infoTekst">
          Sebastian og Mitcho er hjemme, med det mystiske frøet og vurder hva de
          skal gjøre med det.
        </p>
      </div>
      <div class="SvarAlternativ">
        <button id="toggleProsjekter" onclick="byttSide('side3')">
          Plante frøet
        </button>
        <button id="toggleProsjekter" onclick="byttSide('side5')">
          ikke plante frøet
        </button>
      </div>
    </div>

    <div id="side3" style="display: none">
      <div class="kort">
        <img
          class="bildeKort"
          src="bilder/Mappe_bilder_2/Ødelakt hus .jpeg"
          alt="feil"
        />
        <button id="toggleProsjekter" onclick="byttSide('side4')">
          Forsette og redde tingene deres og bygge opp huset.
        </button>
        <button id="toggleProsjekter" onclick="byttSide('side5')">
          Flytte til en ny by og forlate alt.
        </button>
      </div>
    </div>

    <div id="side4" style="display: none">
      <div class="kort">
        <img class="bildeKort" src="bilder/Pæra på havet .jpg" alt="feil" />
        <button id="toggleProsjekter" onclick="byttSide('side5')">
          Snu og dra til bake til byen
        </button>

        <button id="toggleProsjekter" onclick="byttSide('side6')">
          Forsette oppdraget
        </button>
      </div>
    </div>

    <div id="side5" style="display: none">
      <div class="kort">
        <img class="bildeKort" src="bilder/Du Tapte 2.0.png" alt="feil" />
        <button id="toggleProsjekter" onclick="byttSide('side1')">
          Start på nytt ?
        </button>
      </div>
    </div>

    <div id="side6" style="display: none">
      <div class="kort">
        <img class="bildeKort" src="bilder/Du Vant.png" alt="feil" />
        <button id="toggleProsjekter" onclick="byttSide('side1')">
          GÅ til bake ?
        </button>
      </div>
    </div>
  </body>
</html>
